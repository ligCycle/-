<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · ผู้กรอกแบบสอบถาม</title>
<style>
  :root {
    --bg: #eef1ef; --card: #ffffff; --ink: #16211f; --ink-soft: #55635f;
    --ink-faint: #8b9793; --line: #dce2df; --field: #f7f9f8;
    --accent: #0d8b7f; --accent-ink: #ffffff; --accent-soft: #e2f2ef;
    --star: #f59e0b; --row-alt: #f7f9f8;
    --shadow: 0 1px 2px rgba(22,33,31,.04), 0 10px 30px -18px rgba(22,33,31,.25);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1513; --card: #16201d; --ink: #eef3f1; --ink-soft: #a5b2ae;
      --ink-faint: #6f7d78; --line: #2a3733; --field: #101815;
      --accent: #2bb3a3; --accent-ink: #04120f; --accent-soft: #12302b;
      --star: #f5b433; --row-alt: #131d1a;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 14px 40px -20px rgba(0,0,0,.6);
    }
  }
  :root[data-theme="light"] {
    --bg: #eef1ef; --card: #ffffff; --ink: #16211f; --ink-soft: #55635f;
    --ink-faint: #8b9793; --line: #dce2df; --field: #f7f9f8;
    --accent: #0d8b7f; --accent-ink: #ffffff; --accent-soft: #e2f2ef;
    --star: #f59e0b; --row-alt: #f7f9f8;
    --shadow: 0 1px 2px rgba(22,33,31,.04), 0 10px 30px -18px rgba(22,33,31,.25);
  }
  :root[data-theme="dark"] {
    --bg: #0e1513; --card: #16201d; --ink: #eef3f1; --ink-soft: #a5b2ae;
    --ink-faint: #6f7d78; --line: #2a3733; --field: #101815;
    --accent: #2bb3a3; --accent-ink: #04120f; --accent-soft: #12302b;
    --star: #f5b433; --row-alt: #131d1a;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 14px 40px -20px rgba(0,0,0,.6);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Segoe UI", "Leelawadee UI", "Noto Sans Thai", system-ui, -apple-system, sans-serif;
    line-height: 1.5; -webkit-font-smoothing: antialiased;
    padding: clamp(16px, 3vw, 36px);
  }
  .container { max-width: 1080px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }
  header { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
  .title h1 { margin: 0; font-size: clamp(22px, 4vw, 28px); letter-spacing: -.01em; }
  .title p { margin: 4px 0 0; color: var(--ink-soft); font-size: 14px; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    font: inherit; font-weight: 700; font-size: 14px; cursor: pointer;
    border-radius: 10px; padding: 10px 16px; border: 1.5px solid var(--line);
    background: var(--card); color: var(--ink); text-decoration: none; display: inline-flex; align-items: center; gap: 7px;
    transition: border-color .15s, color .15s, background .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.07); color: var(--accent-ink); }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; box-shadow: var(--shadow); }
  .stat .k { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); font-weight: 700; margin: 0; }
  .stat .v { font-size: 30px; font-weight: 800; margin: 6px 0 0; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .stat .v small { font-size: 15px; font-weight: 600; color: var(--ink-soft); }
  .stat .bar { display: flex; gap: 3px; margin-top: 10px; align-items: center; color: var(--star); font-size: 18px; }

  .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search { flex: 1; min-width: 200px; }
  .search input {
    font: inherit; width: 100%; padding: 11px 14px; border-radius: 10px;
    border: 1.5px solid var(--line); background: var(--field); color: var(--ink);
  }
  .search input:focus { outline: none; border-color: var(--accent); }

  .tablewrap { background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 920px; }
  .thumb { width: 46px; height: 46px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); cursor: pointer; display: block; transition: transform .12s; }
  .thumb:hover { transform: scale(1.06); }
  thead th {
    text-align: left; font-size: 12px; letter-spacing: .05em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 700; padding: 14px 16px; border-bottom: 1.5px solid var(--line);
    white-space: nowrap;
  }
  tbody td { padding: 13px 16px; border-bottom: 1px solid var(--line); vertical-align: top; }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  .num { color: var(--ink-faint); font-variant-numeric: tabular-nums; }
  .name { font-weight: 700; }
  a.mail, a.tel { color: var(--accent); text-decoration: none; }
  a.mail:hover, a.tel:hover { text-decoration: underline; }
  .tel { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .stars-cell { color: var(--star); white-space: nowrap; font-size: 15px; }
  .stars-cell .n { color: var(--ink-soft); font-size: 12px; margin-left: 4px; }
  .comment { color: var(--ink-soft); max-width: 320px; }
  .when { color: var(--ink-faint); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .empty { padding: 60px 20px; text-align: center; color: var(--ink-faint); }

  footer { text-align: center; color: var(--ink-faint); font-size: 12.5px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">
      <h1>รายชื่อผู้กรอกแบบสอบถาม</h1>
      <p>ระบบหลังบ้าน · ความพึงพอใจลูกค้า</p>
    </div>
    <div class="actions">
      <a class="btn" href="/">📝 หน้าแบบสอบถาม</a>
      <button class="btn" id="refresh">↻ รีเฟรช</button>
      <a class="btn primary" href="/api/export.csv" download>⬇️ ดาวน์โหลด CSV</a>
      <button class="btn" id="logout">ออกจากระบบ</button>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <div class="search">
      <input type="search" id="search" placeholder="ค้นหาชื่อ / อีเมล / เบอร์โทร..." />
    </div>
  </div>

  <div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>ชื่อ-นามสกุล</th>
          <th>อีเมล (Gmail)</th>
          <th>เบอร์โทร</th>
          <th>วันเกิด (อายุ)</th>
          <th>รูป</th>
          <th>คะแนน</th>
          <th>ข้อเสนอแนะ</th>
          <th>วันเวลาที่ส่ง</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">ยังไม่มีผู้กรอกแบบสอบถาม</div>
  </div>

  <footer>อัปเดตล่าสุด <span id="updated">—</span></footer>
</div>

<script>
  var all = [];

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function stars(n) {
    var full = '★'.repeat(n) + '☆'.repeat(5 - n);
    return '<span class="stars-cell">' + full + '<span class="n">' + n + '/5</span></span>';
  }
  function photoCell(r) {
    if (!r.hasPhoto) return '<span class="num">—</span>';
    var src = '/api/photo?id=' + encodeURIComponent(r.id);
    return '<a href="' + src + '" target="_blank" rel="noopener" title="เปิดรูปเต็ม"><img class="thumb" src="' + src + '" alt="รูปของ ' + esc(r.name) + '" loading="lazy"></a>';
  }
  function fmtDate(iso) {
    try {
      return new Date(iso).toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
    } catch (e) { return iso; }
  }
  function fmtBirthdate(bd) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(bd || '')) return '<span class="num">—</span>';
    var d = new Date(bd + 'T00:00:00');
    var txt = d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
    return esc(txt) + ' <span class="n" style="color:var(--ink-faint);font-size:12px">(' + ageFrom(bd) + ' ปี)</span>';
  }
  function ageFrom(bd) {
    var b = new Date(bd + 'T00:00:00'), now = new Date();
    var age = now.getFullYear() - b.getFullYear();
    var m = now.getMonth() - b.getMonth();
    if (m < 0 || (m === 0 && now.getDate() < b.getDate())) age--;
    return age;
  }

  function renderStats() {
    var n = all.length;
    var avg = n ? (all.reduce(function (s, r) { return s + (r.rating || 0); }, 0) / n) : 0;
    var counts = [0, 0, 0, 0, 0];
    all.forEach(function (r) { if (r.rating >= 1 && r.rating <= 5) counts[r.rating - 1]++; });
    var promoters = counts[3] + counts[4];
    var pct = n ? Math.round(promoters / n * 100) : 0;
    var avgStars = '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg));

    document.getElementById('stats').innerHTML =
      stat('จำนวนคำตอบ', n + ' <small>รายการ</small>', '') +
      stat('คะแนนเฉลี่ย', avg.toFixed(2) + ' <small>/ 5</small>', '<div class="bar">' + avgStars + '</div>') +
      stat('พึงพอใจ (4-5 ดาว)', pct + '<small>%</small>', '') +
      stat('คำตอบล่าสุด', n ? '<small>' + esc(fmtDate(all[0].submittedAt)) + '</small>' : '—', '');
  }
  function stat(k, v, extra) {
    return '<div class="stat"><p class="k">' + k + '</p><p class="v">' + v + '</p>' + extra + '</div>';
  }

  function renderRows() {
    var q = document.getElementById('search').value.trim().toLowerCase();
    var list = all.filter(function (r) {
      if (!q) return true;
      return (r.name + ' ' + r.email + ' ' + r.phone).toLowerCase().indexOf(q) >= 0;
    });
    var tbody = document.getElementById('rows');
    document.getElementById('empty').style.display = list.length ? 'none' : 'block';

    tbody.innerHTML = list.map(function (r, i) {
      var phoneDisp = String(r.phone || '');
      if (phoneDisp.length === 10) phoneDisp = phoneDisp.slice(0, 3) + '-' + phoneDisp.slice(3, 6) + '-' + phoneDisp.slice(6);
      return '<tr>' +
        '<td class="num">' + (i + 1) + '</td>' +
        '<td class="name">' + esc(r.name) + '</td>' +
        '<td><a class="mail" href="mailto:' + esc(r.email) + '">' + esc(r.email) + '</a></td>' +
        '<td><a class="tel" href="tel:' + esc(r.phone) + '">' + esc(phoneDisp) + '</a></td>' +
        '<td class="when">' + fmtBirthdate(r.birthdate) + '</td>' +
        '<td>' + photoCell(r) + '</td>' +
        '<td>' + stars(r.rating) + '</td>' +
        '<td class="comment">' + (r.comment ? esc(r.comment) : '<span class="num">—</span>') + '</td>' +
        '<td class="when">' + esc(fmtDate(r.submittedAt)) + '</td>' +
        '</tr>';
    }).join('');
  }

  async function load() {
    try {
      var resp = await fetch('/api/responses', { headers: { 'Accept': 'application/json' } });
      if (resp.status === 401) { window.location.href = '/login'; return; }
      if (!resp.ok) throw new Error('auth');
      var data = await resp.json();
      all = data.responses || [];
      renderStats();
      renderRows();
      document.getElementById('updated').textContent = new Date().toLocaleTimeString('th-TH');
    } catch (e) {
      document.getElementById('empty').textContent = 'โหลดข้อมูลไม่สำเร็จ — ลองรีเฟรชหรือเข้าสู่ระบบใหม่';
      document.getElementById('empty').style.display = 'block';
    }
  }

  document.getElementById('refresh').addEventListener('click', load);
  document.getElementById('search').addEventListener('input', renderRows);
  document.getElementById('logout').addEventListener('click', async function () {
    try { await fetch('/api/logout', { method: 'POST' }); } catch (e) {}
    window.location.href = '/login';
  });
  load();
</script>
</body>
</html>
